<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StockBase</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#efe8e8;
}

.navbar {
  background: #a5a2a2 !important;
}

.navbar a,
.navbar .nav-link,
.navbar .navbar-brand,
.navbar span {
  color: white !important;
}

footer{
  background:#111;
  color:white;
  text-align:center;
  padding:10px;
  margin-top:125px;
}
</style>
</head>

<body>

<!-- ===== MENU ===== -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    
<a class="navbar-brand d-flex align-items-center" href="#">
    <img src="Logoa2.png" alt="StockBase Logo" style="height:60px; margin-right:20px;">
    <span></span>
    </a>
    
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="StockBase.html">Hasiera</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Kontaktua</a></li>
        <li class="nav-item"><a class="nav-link" href="Login.html">Login</a></li>    
      </ul>
    </div>
  </div>
</nav>

<section id="kontaktua" class="container mt-5">

<h2 class="text-center mb-4">Kontaktua</h2>

<div class="row justify-content-center">
<div class="col-md-6">

<!-- FORMULARIO FUNCIONAL -->
<form action="https://formspree.io/f/mdaynqvp" method="POST">

<div class="mb-3">
<label class="form-label">Izena</label>
<input type="text" name="nombre" class="form-control" placeholder="Idatzi zure izena" required>
</div>

<div class="mb-3">
<label class="form-label">Emaila</label>
<input type="email" name="email" class="form-control" placeholder="Idatzi zure emaila" required>
</div>

<div class="mb-3">
<label class="form-label">Mezua</label>
<textarea name="mensaje" class="form-control" rows="4" placeholder="Idatzi mezua" required></textarea>
</div>

<!-- Opcional: asunto del correo -->
<input type="hidden" name="_subject" value="Nuevo mensaje desde StockBase">

<div class="text-center">
<button type="submit" class="btn btn-danger">Bidali</button>
</div>

</form>

</div>
</div>

</section>

<footer>
© 2026 StockBase
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
